name: test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Run Python unit tests
      run: python3 -m unittest tests/test_acm.py

    - name: Syntax check Bash scripts
      run: |
        bash -n acm
        bash -n install.sh
        bash -n modular/acm
