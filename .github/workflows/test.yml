name: test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Create dummy credentials
      run: |
        echo "USER_AGENT = 'mock-agent'" > credentials.py
        echo "CLIENT_ID = 'mock-client'" >> credentials.py
        echo "def get_client_secret(): return 'mock-secret'" >> credentials.py

    - name: Run Python unit tests
      run: python3 -m unittest discover -s tests -p "test_*.py"

    - name: Syntax check Bash scripts
      run: |
        bash -n acm
        bash -n install.sh
        bash -n modular/acm
